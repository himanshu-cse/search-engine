<!DOCTYPE html>
<html>
<head>
    <title>Search Analytics</title>
    <style>

        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            background: #f5f5f5;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td, th {
            border: 1px solid #ddd;
            padding: 10px;
        }

        th {
            background: #eee;
        }

    </style>
</head>

<body>
    <h1>Search Analytics</h1>

    <div class="card">
        <h2>Total Searches</h2>
        <h3>{{ analytics.total_searches }}</h3>
    </div>

    <div class="card">
        <h2>Average Results Returned</h2>
        <h3>{{ analytics.average_results }}</h3>
    </div>

    <div class="card">
        <h2>Top Queries</h2>
        <table>
            <tr>
                <th>Query</th>
                <th>Count</th>
            </tr>

            {% for query, count in analytics.top_queries %}
                <tr>
                    <td>{{ query }}</td>
                    <td>{{ count }}</td>
                </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
